<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ─── PRIMARY META ─── -->
<title>¡Gracias! — Descargá la guía de IA para Abogados | Pragma</title>
<meta name="description" content="Gracias por dejarnos tu mail. Descargá la guía con los recursos, herramientas y prompts de IA para equipos legales.">
<meta name="author" content="Pragma">
<link rel="canonical" href="https://www.bepragma.com.ar/gracias">

<!-- ─── FAVICON ─── -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<meta name="theme-color" content="#0a0c14">

<!-- ─── ROBOTS ─── -->
<meta name="robots" content="noindex, nofollow">

<!-- ─── FONTS ─── -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --cream: oklch(96%  0.012 80);
  --white: #ffffff;
  --dark:  oklch(12%  0.05  258);
  --navy:  oklch(19%  0.09  258);
  --elec:  oklch(59%  0.23  252);
  --sand:  oklch(83%  0.05  78);
  --muted: oklch(52%  0.025 258);
  --rule:  oklch(84%  0.018 258);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--dark);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
}

/* ── NAV ── */
nav {
  padding: 0 48px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--rule);
  background: var(--cream);
}
.logo {
  font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800;
  font-size: 22px; letter-spacing: -.02em; color: var(--dark);
  text-decoration: none; display: inline-flex; align-items: baseline;
}
.logo .logo-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--elec); display: inline-block; margin-left: 2px;
}
.nav-back {
  font-size: 13.5px; color: var(--muted); text-decoration: none;
  transition: color .15s; display: inline-flex; align-items: center; gap: 6px;
}
.nav-back:hover { color: var(--dark); }

/* ── MAIN ── */
main {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 64px 48px;
}
.thanks {
  max-width: 640px; text-align: center;
}
.thanks-tag {
  font-size: 11px; font-weight: 700; letter-spacing: .18em;
  text-transform: uppercase; color: var(--elec); margin-bottom: 28px;
}
.thanks-h1 {
  font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800;
  font-size: clamp(36px, 6vw, 64px);
  letter-spacing: -.03em; line-height: 1.02;
  color: var(--dark);
}
.thanks-sub {
  font-size: clamp(16px, 2vw, 19px); font-weight: 400; color: var(--muted);
  line-height: 1.6; margin-top: 24px;
}
.btn-download {
  font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600;
  padding: 16px 36px; border-radius: 12px;
  background: var(--elec); color: #fff; border: none; cursor: pointer;
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 12px;
  margin-top: 40px;
  transition: opacity .15s, transform .15s;
}
.btn-download:hover { opacity: .9; transform: translateY(-2px); }
.btn-download svg { width: 18px; height: 18px; }
.thanks-note {
  font-size: 13px; color: var(--muted); margin-top: 24px; line-height: 1.6;
}
.thanks-note a { color: var(--dark); font-weight: 600; text-decoration: none; }
.thanks-note a:hover { color: var(--elec); }

/* ── FOOTER ── */
footer {
  padding: 32px 48px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--rule); flex-wrap: wrap; gap: 16px;
}
.footer-logo {
  font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800;
  font-size: 17px; color: var(--dark);
  display: inline-flex; align-items: baseline;
  text-decoration: none;
}
.footer-logo .logo-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--elec); display: inline-block; margin-left: 2px;
}
.footer-copy { font-size: 12px; color: var(--muted); }

/* ── MOBILE (<768px) ── */
@media (max-width: 767px) {
  nav { padding: 0 24px; }
  main { padding: 48px 24px; }
  .btn-download { width: 100%; justify-content: center; min-height: 44px; }
  footer { padding: 28px 24px; flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <a href="/" class="logo">pragma<span class="logo-dot"></span></a>
  <a href="https://www.bepragma.com.ar/" class="nav-back">
    <svg viewBox="0 0 14 14" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7H2M7 2L2 7l5 5"/></svg>
    Ir al sitio
  </a>
</nav>

<main>
  <div class="thanks">
    <div class="thanks-tag">Listo</div>
    <h1 class="thanks-h1">¡Gracias! Acá podés descargar la guía:</h1>
    <p class="thanks-sub">
      Reúne los recursos, herramientas y prompts que vimos en la charla de IA para Abogados.
    </p>
    <a class="btn-download" href="/guia-ia-abogados.pdf" target="_blank" rel="noopener" download>
      <svg viewBox="0 0 18 18" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2v10M5 8l4 4 4-4M3 15h12"/></svg>
      Descargar la guía
    </a>
    <p class="thanks-note">
      ¿Algún problema con la descarga? Escribinos a <a href="mailto:mpansa@bepragma.com.ar">mpansa@bepragma.com.ar</a>.
    </p>
  </div>
</main>

<!-- ── FOOTER ── -->
<footer>
  <a href="/" class="footer-logo">pragma<span class="logo-dot"></span></a>
  <div class="footer-copy">© 2026 Pragma. Todos los derechos reservados.</div>
</footer>

</body>
</html>
